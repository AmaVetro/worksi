services:
  mysql:
    image: mysql:8.0
    container_name: worksi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-worksi}
      MYSQL_USER: ${MYSQL_USER:-worksi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-worksi}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
    container_name: worksi-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-worksi}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-worksi}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-worksi}
      WORKSI_CV_STORAGE_DIR: /data/cv
      WORKSI_SECURITY_PASSWORD_RECOVERY_MVP_SKIP_CODE_CHECK: "true"
    ports:
      - "8080:8080"
    volumes:
      - cv_data:/data/cv

  ai:
    build:
      context: ./ai-service
    container_name: worksi-ai
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  cv_data:
