server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/worksi?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:worksi}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:worksi}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

worksi.jwt.secret=${WORKSI_JWT_SECRET:worksi-dev-jwt-secret-key-min-32-chars-long-change-in-prod-ok}
worksi.jwt.expiration-seconds=${WORKSI_JWT_EXPIRATION_SECONDS:3600}
worksi.jwt.recovery-expiration-seconds=${WORKSI_JWT_RECOVERY_EXPIRATION_SECONDS:900}
worksi.security.lock-duration-minutes=${WORKSI_LOCK_DURATION_MINUTES:30}
worksi.security.max-failed-login-attempts=4
worksi.security.password-recovery-code-validity-minutes=${WORKSI_PASSWORD_RECOVERY_CODE_MINUTES:15}
worksi.storage.company-images=${WORKSI_STORAGE_COMPANY_IMAGES:${WORKSI_CV_STORAGE_DIR:./storage}/company-images}
